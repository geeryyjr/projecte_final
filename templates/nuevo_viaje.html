{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow p-4">
            <h3 class="text-info">Planificar Nuevo Viaje</h3>
            <form method="POST">
                <label>Nombre del Destino:</label>
                <input type="text" name="destino" class="form-control mb-2" placeholder="Ej: Cancún" required>
                
                <label>País:</label>
                <input type="text" name="pais" class="form-control mb-2" placeholder="Ej: México" required>
                
                <label>Precio por persona (€):</label>
                <input type="number" name="precio" class="form-control mb-2" required>
                
                <label>Fecha de Salida:</label>
                <input type="date" name="fecha" class="form-control mb-3" required>
                
                <button type="submit" class="btn btn-info w-100 text-white">Publicar Oferta</button>
                <a href="/dashboard" class="btn btn-link w-100 text-center">Cancelar</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
