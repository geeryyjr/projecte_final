{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>🏝️ Destinos Disponibles</h2>
    <a href="/nuevo_viaje" class="btn btn-success">+ Añadir Nuevo Destino</a>
</div>


<div class="card shadow">
    <table class="table table-hover mb-0">
        <thead class="table-dark">
            <tr>
                <th>Destino</th>
                <th>País</th>
                <th>Precio</th>
                <th>Fecha Salida</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for v in viajes %}
            <tr>
                <td><strong>{{ v[1] }}</strong></td>
                <td>{{ v[2] }}</td>
                <td class="text-success">{{ v[3] }} €</td>
                <td>{{ v[4] }}</td>
                <td>
                    <a href="/delete/{{ v[0] }}" class="btn btn-danger btn-sm" 
                       onclick="return confirm('¿Borrar este viaje?');">🗑️ Eliminar</a>
                </td>
            </tr>
            {% else %}
            <tr><td colspan="5" class="text-center">No hay viajes registrados.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
